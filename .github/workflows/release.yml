name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore src/Jellyfin.Plugin.NextUpMerge.csproj

      - name: Build
        run: |
          dotnet publish src/Jellyfin.Plugin.NextUpMerge.csproj \
            --configuration Release \
            --output dist/ \
            --no-restore

      - name: Zip dist
        run: |
          cd dist
          zip ../Jellyfin.Plugin.NextUpMerge-${{ github.ref_name }}.zip ./*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.NextUpMerge-${{ github.ref_name }}.zip
          generate_release_notes: true
